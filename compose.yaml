services:
  server:
    build:
      context: .
    container_name: latin-server
    environment:
      NODE_ENV: production
      POSTGRES_HOST: db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/db-password
      POSTGRES_DB: words
      JWT_SECRET_FILE: /run/secrets/jwt-secret
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD_FILE: /run/secrets/admin-password
      ADMIN_API_KEY_FILE: /run/secrets/admin-api-key
    secrets:
      - db-password
      - jwt-secret
      - admin-password
      - admin-api-key
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    mem_limit: 256m
    networks:
      - default
      - web-proxy

  web:
    build:
      context: ${FE_BUILD_CONTEXT:-../latinWordOfTheDay/latinWordOfTheDay}
    container_name: latin-web
    volumes:
      - ./src/static/img:/usr/local/apache2/htdocs/img:ro
    depends_on:
      - server
    restart: unless-stopped
    mem_limit: 64m
    networks:
      - default
      - web-proxy

  db:
    image: postgres:16
    restart: always
    user: postgres
    secrets:
      - db-password
    volumes:
      - db-data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=words
      - POSTGRES_PASSWORD_FILE=/run/secrets/db-password
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 256m
    networks:
      - default

volumes:
  db-data:

secrets:
  db-password:
    file: db/password.txt
  jwt-secret:
    file: db/jwt-secret.txt
  admin-password:
    file: db/admin-password.txt
  admin-api-key:
    file: db/admin-api-key.txt

networks:
  web-proxy:
    external: true
