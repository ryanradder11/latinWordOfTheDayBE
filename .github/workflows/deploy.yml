name: Test & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: npm
      - run: npm ci
      - run: npm test

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout frontend repo
        uses: actions/checkout@v4
        with:
          repository: ryanradder11/LatinWordOfTheDayUI
          path: frontend

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/ryanradder11/latin-server:latest

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend/latinWordOfTheDay
          push: true
          tags: ghcr.io/ryanradder11/latin-web:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to server
        uses: appleboy/ssh-action@v1
        with:
          host: 217.154.66.24
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: GHCR_TOKEN
          script: |
            echo "$GHCR_TOKEN" | docker login ghcr.io -u ryanradder11 --password-stdin
            cd /root/latinWordOfTheDayBE
            git pull origin main
            docker compose -f compose.prod.yaml pull server web
            docker compose -f compose.prod.yaml up -d
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
